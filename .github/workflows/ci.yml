  # ── 6. Auto-create PR once all checks pass ──────────────────────────────
  create-pr:
    name: Auto-create PR to main
    runs-on: ubuntu-latest
    #needs: [gitleaks, trivy, snyk, ruff, test]
    needs: [gitleaks, trivy, ruff]
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
      - name: Create PR to main
        run: |
          gh pr create \
            --title "KQL: ${{ github.ref_name }} (${{ github.sha }})" \
            --body "CI passed. Ready for review." \
            --base main \
            --label ready-to-deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
