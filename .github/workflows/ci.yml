name: CI — Lint, Scan and Test

on:
  push:
    branches:
      - 'kql/**'
    paths:
      - 'queries/**.kql'
      - 'queries/__init__.py'

jobs:

  # ── 1. Gitleaks: scan for secrets ──────────────────────────────────────
  gitleaks:
    name: Gitleaks — secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 2. Trivy: scan dependencies for CVEs ───────────────────────────────
  trivy:
    name: Trivy — dependency CVE scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          skip-dirs: ".git"
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL
          vuln-type: library

  # ── 3. Snyk: dependency vulnerability scan ──────────────────────────────
